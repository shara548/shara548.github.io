<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>愚公移山 · 分类拖拽</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f7f0eb 0%, #e8ddd6 100%);
            font-family: 'Inter', 'Segoe UI', '微软雅黑', system-ui, -apple-system, sans-serif;
            padding: 30px;
        }

        /* ===== 主容器 ===== */
        .app-wrapper {
            display: flex;
            gap: 56px;
            align-items: stretch;
            background: rgba(255, 248, 244, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 48px;
            border-radius: 48px;
            box-shadow:
                0 20px 60px rgba(100, 70, 60, 0.15),
                0 4px 16px rgba(100, 70, 60, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        /* ===== 左侧大类 ===== */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            min-width: 210px;
        }

        .big-box {
            width: 210px;
            height: 128px;
            background: linear-gradient(135deg, #b7a093 0%, #9a887c 100%);
            color: #fff;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 8px 24px rgba(120, 90, 80, 0.20),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            position: relative;
            cursor: default;
            user-select: none;
            padding: 0 12px;
            text-align: center;
        }

        .big-box::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.10), transparent 70%);
            pointer-events: none;
        }

        /* 每个大类不同底色 */
        .big-box[data-key="nature"] {
            background: linear-gradient(135deg, #8fb5a5 0%, #6f9686 100%);
        }
        .big-box[data-key="human"] {
            background: linear-gradient(135deg, #c9a88e 0%, #b08870 100%);
        }
        .big-box[data-key="tool"] {
            background: linear-gradient(135deg, #a89bb8 0%, #8a7a9e 100%);
        }

        .big-box.drag-over {
            transform: scale(1.03);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* ===== 右侧 3x3 网格 ===== */
        .right-grid {
            display: grid;
            grid-template-columns: repeat(3, 170px);
            grid-template-rows: repeat(3, 110px);
            gap: 16px;
            align-content: center;
        }

        .drag-item {
            width: 170px;
            height: 110px;
            background: rgba(255, 248, 244, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 18px;
            font-size: 22px;
            font-weight: 500;
            color: #3d2e28;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px 10px;
            cursor: grab;
            user-select: none;
            border: 1.5px solid rgba(200, 175, 165, 0.35);
            box-shadow:
                0 4px 14px rgba(120, 90, 80, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease;
            word-break: break-word;
            line-height: 1.3;
            position: relative;
        }

        .drag-item:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 32px rgba(120, 90, 80, 0.13);
            background: rgba(255, 248, 244, 0.92);
            border-color: rgba(180, 150, 140, 0.5);
        }

        .drag-item:active {
            cursor: grabbing;
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(120, 90, 80, 0.10);
        }

        .drag-item.dragging {
            opacity: 0.35;
            transform: scale(0.92);
            border-style: dashed;
        }

        /* 移除子类别的彩色边缘 —— 不再有左侧边框颜色 */

        /* ===== 成功弹窗 ===== */
        .tip-overlay {
            position: fixed;
            inset: 0;
            background: rgba(40, 30, 26, 0.40);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        .tip-overlay.show {
            display: flex;
        }

        .tip-box {
            background: rgba(255, 251, 248, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 64px;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(40, 30, 26, 0.30);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tip-box .msg {
            font-size: 34px;
            font-weight: 600;
            color: #3d2e28;
            letter-spacing: 1px;
        }

        .tip-box .sub-msg {
            font-size: 18px;
            color: #8a7a70;
            margin-top: 6px;
            font-weight: 400;
        }

        /* ===== 动画 ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0.80) translateY(20px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* 卡片移除动画 */
        .drag-item.removing {
            transform: scale(0.6) rotate(6deg);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        /* ===== 空状态 ===== */
        .empty-hint {
            display: none;
            grid-column: 1 / -1;
            grid-row: 1 / -1;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #9a887c;
            font-weight: 400;
            letter-spacing: 1px;
            background: rgba(255, 248, 244, 0.3);
            border-radius: 24px;
            border: 2px dashed rgba(180, 155, 145, 0.25);
            padding: 20px;
        }

        .right-grid.empty .empty-hint {
            display: flex;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .app-wrapper {
                flex-direction: column;
                align-items: center;
                padding: 30px 24px;
                gap: 32px;
                border-radius: 32px;
            }

            .left-column {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 14px;
                min-width: unset;
            }

            .big-box {
                width: 150px;
                height: 90px;
                font-size: 20px;
            }

            .right-grid {
                grid-template-columns: repeat(3, 130px);
                grid-template-rows: repeat(3, 90px);
                gap: 12px;
            }

            .drag-item {
                width: 130px;
                height: 90px;
                font-size: 17px;
            }

            .tip-box {
                padding: 28px 36px;
            }
            .tip-box .msg {
                font-size: 26px;
            }
        }

        @media (max-width: 500px) {
            .right-grid {
                grid-template-columns: repeat(3, 100px);
                grid-template-rows: repeat(3, 72px);
                gap: 10px;
            }
            .drag-item {
                width: 100px;
                height: 72px;
                font-size: 14px;
                border-radius: 14px;
                padding: 4px 6px;
            }
            .big-box {
                width: 120px;
                height: 72px;
                font-size: 16px;
                border-radius: 16px;
            }
            .app-wrapper {
                padding: 20px 16px;
                gap: 24px;
            }
            .tip-box {
                padding: 20px 24px;
            }
            .tip-box .msg {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <!-- 左侧三大类别 -->
        <div class="left-column">
            <div class="big-box" data-key="nature">自然条件</div>
            <div class="big-box" data-key="human">人力条件</div>
            <div class="big-box" data-key="tool">工具条件</div>
        </div>

        <!-- 右侧 3x3 拖拽卡片 -->
        <div class="right-grid" id="gridWrap">
            <!-- JS 动态渲染 -->
            <div class="empty-hint">全部归类完成</div>
        </div>

    </div>

    <!-- 成功提示弹窗 -->
    <div class="tip-overlay" id="successTip">
        <div class="tip-box">
            <div class="msg">回答正确！</div>
            <div class="sub-msg">太棒了，继续加油</div>
        </div>
    </div>

    <script>
        // ============================================================
        //  数据
        // ============================================================
        const answerData = {
            nature: ["方七百里", "高万仞", "山北之塞"],
            human: ["年且九十", "三夫荷担", "子孙接力"],
            tool: ["叩石垦壤", "箕畚运土", "往返渤海"]
        };

        // 类别映射（用于给卡片加 data-category，但不再用于样式，保留以备后续）
        const categoryMap = {};
        Object.keys(answerData).forEach(key => {
            answerData[key].forEach(text => {
                categoryMap[text] = key;
            });
        });

        const allItems = [...answerData.nature, ...answerData.human, ...answerData.tool];

        // ============================================================
        //  工具
        // ============================================================
        function randomSort(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const rand = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[rand]] = [copy[rand], copy[i]];
            }
            return copy;
        }

        // ============================================================
        //  渲染
        // ============================================================
        const gridWrap = document.getElementById('gridWrap');
        const tipOverlay = document.getElementById('successTip');
        const allDropBoxes = document.querySelectorAll('.big-box');

        let dragText = '';

        function renderCards() {
            const hint = gridWrap.querySelector('.empty-hint');
            gridWrap.innerHTML = '';
            if (hint) gridWrap.appendChild(hint);

            const shuffled = randomSort(allItems);
            shuffled.forEach(text => {
                const div = document.createElement('div');
                div.className = 'drag-item';
                div.innerText = text;
                div.draggable = true;
                div.dataset.category = categoryMap[text] || '';
                div.dataset.text = text;

                div.addEventListener('dragstart', handleDragStart);
                div.addEventListener('dragend', handleDragEnd);

                gridWrap.appendChild(div);
            });

            updateEmptyState();
        }

        // ============================================================
        //  拖拽事件
        // ============================================================
        function handleDragStart(e) {
            const el = e.target;
            dragText = el.dataset.text;
            e.dataTransfer.setData('text/plain', dragText);
            e.dataTransfer.effectAllowed = 'move';
            el.classList.add('dragging');
            allDropBoxes.forEach(box => box.classList.add('drag-over'));
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            allDropBoxes.forEach(box => box.classList.remove('drag-over'));
        }

        // ============================================================
        //  放置区监听
        // ============================================================
        allDropBoxes.forEach(box => {
            box.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });

            box.addEventListener('drop', function(e) {
                e.preventDefault();
                allDropBoxes.forEach(b => b.classList.remove('drag-over'));

                const type = this.dataset.key;
                const targetTxt = e.dataTransfer.getData('text/plain');

                if (answerData[type] && answerData[type].includes(targetTxt)) {
                    const allDrag = document.querySelectorAll('.drag-item');
                    const targetEl = Array.from(allDrag).find(el => el.dataset.text === targetTxt);
                    if (targetEl) {
                        targetEl.classList.add('removing');
                        setTimeout(() => {
                            targetEl.remove();
                            updateEmptyState();
                        }, 280);
                    }

                    tipOverlay.classList.add('show');
                    setTimeout(() => {
                        tipOverlay.classList.remove('show');
                    }, 1200);
                }
            });
        });

        // ============================================================
        //  空状态
        // ============================================================
        function updateEmptyState() {
            const items = gridWrap.querySelectorAll('.drag-item');
            if (items.length === 0) {
                gridWrap.classList.add('empty');
            } else {
                gridWrap.classList.remove('empty');
            }
        }

        // ============================================================
        //  初始化
        // ============================================================
        renderCards();

        tipOverlay.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
            }
        });
    </script>
</body>
</html>
